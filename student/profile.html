<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Profile — FYP Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
  <style>
    body { background: var(--color-lightbg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: var(--space-6); }
    .profile-card { background: white; border-radius: var(--radius-2xl); width: 100%; max-width: 600px; padding: var(--space-8); box-shadow: var(--shadow-xl); }
    .profile-header { text-align: center; margin-bottom: var(--space-8); }
    .profile-header h1 { font-size: var(--font-size-2xl); color: var(--color-text); font-weight: 800; margin-bottom: var(--space-2); }
    .profile-header p { color: var(--color-text-muted); font-size: var(--font-size-sm); }
    
    .avatar-upload { display: flex; flex-direction: column; align-items: center; gap: var(--space-4); margin-bottom: var(--space-6); }
    .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: var(--color-surface-alt); border: 2px dashed var(--color-border); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--color-text-faint); overflow: hidden; position: relative; cursor: pointer; transition: all var(--transition-fast); }
    .avatar-preview:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-bottom: var(--space-4); }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="profile-card animate-fade-in">
    <div class="profile-header">
      <h1>Complete Your Profile</h1>
      <p>Please provide your academic details to continue.</p>
    </div>

    <form id="profileForm" onsubmit="handleProfileSubmit(event)">
      
      <div class="avatar-upload">
        <label for="avatarFile" class="avatar-preview" id="avatarPreview">
          <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="avatarFile" accept="image/*" style="display: none" onchange="previewImage(event)"/>
        <div class="form-hint">Click to upload profile photo</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="input-with-icon">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="pName" class="form-input" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-with-icon">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="pEmail" class="form-input" readonly style="background: var(--color-surface-alt); cursor: not-allowed;" />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Program</label>
          <div class="input-with-icon">
            <i class="fas fa-graduation-cap input-icon"></i>
            <select id="pProgram" class="form-select" required style="padding-left: 2.5rem;">
              <option value="">Select Program</option>
              <option value="BS Computer Science">BS Computer Science</option>
              <option value="BS Software Engineering">BS Software Engineering</option>
              <option value="BS Data Science">BS Data Science</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Session</label>
          <div class="input-with-icon">
            <i class="fas fa-calendar-alt input-icon"></i>
            <select id="pSession" class="form-select" required style="padding-left: 2.5rem;">
              <option value="">Select Session</option>
              <option value="FA22">FA22</option>
              <option value="SP23">SP23</option>
              <option value="FA23">FA23</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: var(--space-6);">
        <label class="form-label">CGPA</label>
        <div class="input-with-icon">
          <i class="fas fa-star input-icon"></i>
          <input type="number" id="pCGPA" class="form-input" step="0.01" min="2.0" max="4.0" required placeholder="e.g. 3.50" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg">
        Save & Continue <i class="fas fa-arrow-right"></i>
      </button>

    </form>
  </div>

  <script src="../scripts/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = AUTH.requireRole('Student');
      if (!user) return;
      if (user.profileCompleted) {
        window.location.replace('dashboard.html');
      }
      document.getElementById('pName').value = user.name || '';
      document.getElementById('pEmail').value = user.email || '';
    });

    function previewImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
        }
        reader.readAsDataURL(file);
      }
    }

    function handleProfileSubmit(e) {
      e.preventDefault();
      
      const program = document.getElementById('pProgram').value;
      const session = document.getElementById('pSession').value;
      const cgpa = document.getElementById('pCGPA').value;
      const name = document.getElementById('pName').value;

      const btn = e.target.querySelector('button[type="submit"]');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
      btn.disabled = true;

      setTimeout(() => {
        AUTH.updateUser({
          name, program, session, cgpa, profileCompleted: true
        });
        window.location.replace('dashboard.html');
      }, 800);
    }
  </script>
</body>
</html>
