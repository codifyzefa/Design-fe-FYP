    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: #eff6ff;
        margin: 0;
        padding: 0;
      }
      /* Override dashboard.css which sets position:fixed on body — the React app manages its own layout */
      .dashboard-body {
        display: block !important;
        position: static !important;
        height: auto !important;
        overflow: auto !important;
        inset: unset !important;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Poppins", sans-serif;
      }

      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }

      :root {
        --primary: #1e3a8a;
        --primary-h: #1e2f6e;
        --secondary: #2563eb;
        --sidebar-w: 256px;
        --sidebar-collapsed: 68px;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: var(--sidebar-w);
        background-color: "#1e3a8a"; 
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        display: flex;
        flex-direction: column;
        transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 50;
        overflow: hidden;
        box-shadow: 4px 0 20px rgba(30, 58, 138, 0.25);
      }
      .sidebar.collapsed {
        width: var(--sidebar-collapsed);
      }
      .sidebar-text {
        transition:
          opacity 0.2s,
          width 0.2s;
        white-space: nowrap;
        overflow: hidden;
      }
      .collapsed .sidebar-text {
        opacity: 0;
        width: 0;
      }

      /* ── Nav Items ── */
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 9px 14px;
        border-radius: 12px;
        width: 100%;
        border: none;
        cursor: pointer;
        background: transparent;
        color: rgba(255, 255, 255, 0.65);
        font-size: 13.5px;
        font-family: "DM Sans", sans-serif;
        font-weight: 500;
        transition:
          background 0.18s,
          color 0.18s;
        text-align: left;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .nav-btn.active {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        font-weight: 600;
        box-shadow: inset 3px 0 0 rgba(255, 255, 255, 0.8);
      }

      /* ── Cards ── */
      .card {
        background: #fff;
        border-radius: 16px;
        border: 1px solid #e8edf3;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .card-hover {
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(0, 91, 172, 0.12);
      }

      /* ── Badges ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 9px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .badge-high {
        background: #fee2e2;
        color: #c62828;
      }
      .badge-medium {
        background: #fff3cd;
        color: #b45309;
      }
      .badge-low {
        background: #dcfce7;
        color: #166534;
      }
      .badge-todo {
        background: #f1f5f9;
        color: #475569;
      }
      .badge-inprogress {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .badge-review {
        background: #ede9fe;
        color: #7c3aed;
      }
      .badge-done {
        background: #d1fae5;
        color: #065f46;
      }

      /* ── Task Card ── */
      .task-card {
        background: #fff;
        border-radius: 12px;
        padding: 12px;
        cursor: grab;
        user-select: none;
        border: 1.5px solid #edf0f4;
        transition:
          box-shadow 0.15s,
          border-color 0.15s;
      }
      .task-card:hover {
        box-shadow: 0 6px 18px rgba(0, 91, 172, 0.1);
        border-color: #c5d6ee;
      }
      .task-card.is-dragging {
        opacity: 0.45;
        transform: rotate(1.5deg) scale(1.02);
        cursor: grabbing;
      }

      /* ── Kanban Column ── */
      .kanban-col {
        min-height: 480px;
        border-radius: 14px;
        padding: 14px;
        border: 2px solid transparent;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .kanban-col.drag-over {
        border-color: var(--primary);
        background: rgba(0, 91, 172, 0.04) !important;
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(5px);
      }
      .modal-box {
        background: #fff;
        border-radius: 20px;
        width: 100%;
        max-width: 520px;
        margin: 16px;
        animation: slideUp 0.22s ease-out;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22);
      }

      /* ── Notif Dropdown ── */
      .notif-drop {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        width: 360px;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.14);
        z-index: 90;
        border: 1px solid #e8edf3;
        animation: fadeDown 0.18s ease-out;
      }

      /* ── Progress Bar ── */
      .prog-bar {
        height: 6px;
        background: #edf0f4;
        border-radius: 99px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        border-radius: 99px;
        transition: width 0.6s ease;
      }

      /* ── Animations ── */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes pulseDot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .fade-in {
        animation: fadeIn 0.25s ease-out;
      }
      .pulse-dot {
        animation: pulseDot 2s infinite;
      }

      /* ── Calendar ── */
      .cal-day {
        min-height: 80px;
        border-right: 1px solid #f1f5f9;
        border-bottom: 1px solid #f1f5f9;
        padding: 6px;
        transition: background 0.12s;
      }
      .cal-day:hover {
        background: #f8faff;
      }

      /* ── Tooltip avatar ── */
      .avatar {
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        font-family: "Outfit", sans-serif;
      }

      /* ── Table ── */
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        text-align: left;
      }

      /* ── Star ── */
      .star-fill {
        color: #f59e0b;
      }
      .star-empty {
        color: #d1d5db;
      }

      /* ── Input focus ── */
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.1) !important;
      }

      /* ── Tag pill ── */

        display: inline-block;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        background: #e0ecfb;
        color: #1e4d8c;
      }
    </style>

      tailwind.config = { corePlugins: { preflight: false } };

      /* ═══════════════════════════════
   KANBAN
═══════════════════════════════ */
      function Kanban({ tasks, setTasks, users, onEdit, onDelete }) {
        const cols = [
          {
            id: "todo",
            label: "Not Started",
            color: "#64748b",
            bg: "#f8fafc",
            icon: "📋",
          },
          {
            id: "inprogress",
            label: "In Progress",
            color: "#2563eb",
            bg: "#eff6ff",
            icon: "⚡",
          },
          {
            id: "review",
            label: "Review",
            color: "#7c3aed",
            bg: "#faf5ff",
            icon: "👁️",
          },
          {
            id: "done",
            label: "Completed",
            color: "#16a34a",
            bg: "#f0fdf4",
            icon: "✅",
          },
        ];
        const [dragged, setDragged] = useState(null);
        const [overCol, setOverCol] = useState(null);
        const [filter, setFilter] = useState({
          pri: "all",
          mem: "all",
          search: "",
        });

        const filtered = tasks.filter((t) => {
          if (filter.pri !== "all" && t.priority !== filter.pri) return false;
          if (filter.mem !== "all" && t.assignee !== parseInt(filter.mem))
            return false;
          if (
            filter.search &&
            !t.title.toLowerCase().includes(filter.search.toLowerCase())
          )
            return false;
          return true;
        });

        const onDragStart = (e, t) => {
          setDragged(t);
          e.dataTransfer.effectAllowed = "move";
        };
        const onDragOver = (e, id) => {
          e.preventDefault();
          setOverCol(id);
        };
        const onDrop = (e, newStatus) => {
          e.preventDefault();
          if (dragged && dragged.status !== newStatus) {
            setTasks((prev) =>
              prev.map((t) =>
                t.id === dragged.id
                  ? {
                      ...t,
                      status: newStatus,
                      progress: newStatus === "done" ? 100 : t.progress,
                    }
                  : t,
              ),
            );
          }
          setDragged(null);
          setOverCol(null);
        };

        const sel = {
          padding: "9px 14px",
          border: "1.5px solid #e2e8f0",
          borderRadius: 10,
          fontSize: 13,
          fontFamily: "DM Sans,sans-serif",
          background: "#fff",
          color: "#1e293b",
          cursor: "pointer",
        };

        return (
          <div className="fade-in">
            {/* Filters */}
            <div
              style={{
                display: "flex",
                gap: 10,
                marginBottom: 20,
                flexWrap: "wrap",
                alignItems: "center",
              }}
            >
              <input
                value={filter.search}
                onChange={(e) =>
                  setFilter({ ...filter, search: e.target.value })
                }
                placeholder="🔍 Search tasks…"
                style={{ ...sel, flex: 1, minWidth: 180, maxWidth: 260 }}
              />
              <select
                value={filter.pri}
                onChange={(e) => setFilter({ ...filter, pri: e.target.value })}
                style={sel}
              >
                <option value="all">All Priorities</option>
                <option value="high">🔴 High</option>
                <option value="medium">🟡 Medium</option>
                <option value="low">🟢 Low</option>
              </select>
              <select
                value={filter.mem}
                onChange={(e) => setFilter({ ...filter, mem: e.target.value })}
                style={sel}
              >
                <option value="all">All Members</option>
                {users
                  .filter((u) => u.id !== 5)
                  .map((u) => (
                    <option key={u.id} value={u.id}>
                      {u.name}
                    </option>
                  ))}
              </select>
              <span
                style={{
                  marginLeft: "auto",
                  fontSize: 12,
                  color: "#94a3b8",
                  fontWeight: 500,
                }}
              >
                {filtered.length} tasks · Drag cards to move
              </span>
            </div>

            {/* Board */}
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(4,1fr)",
                gap: 16,
              }}
            >
              {cols.map((col) => {
                const colTasks = filtered.filter((t) => t.status === col.id);
                return (
                  <div
                    key={col.id}
                    className={`kanban-col ${overCol === col.id ? "drag-over" : ""}`}
                    style={{ background: col.bg }}
                    onDragOver={(e) => onDragOver(e, col.id)}
                    onDrop={(e) => onDrop(e, col.id)}
                    onDragLeave={() => setOverCol(null)}
                  >
                    {/* Col header */}
                    <div
                      style={{
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "space-between",
                        marginBottom: 12,
                        paddingBottom: 12,
                        borderBottom: "1px solid rgba(255,255,255,.6)",
                      }}
                    >
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 7,
                        }}
                      >
                        <span style={{ fontSize: 16 }}>{col.icon}</span>
                        <span
                          style={{
                            fontWeight: 700,
                            fontSize: 13,
                            color: col.color,
                            fontFamily: "Outfit,sans-serif",
                          }}
                        >
                          {col.label}
                        </span>
                      </div>
                      <span
                        style={{
                          width: 22,
                          height: 22,
                          borderRadius: "50%",
                          background: col.color,
                          color: "#fff",
                          fontSize: 11,
                          fontWeight: 800,
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                          fontFamily: "Outfit,sans-serif",
                        }}
                      >
                        {colTasks.length}
                      </span>
                    </div>

                    {/* Cards */}
                    <div
                      style={{
                        display: "flex",
                        flexDirection: "column",
                        gap: 10,
                      }}
                    >
                      {colTasks.map((t) => {
                        const u = userById(t.assignee, users);
                        const over = isOverdue(t.due) && t.status !== "done";
                        return (
                          <div
                            key={t.id}
                            className={`task-card ${dragged?.id === t.id ? "is-dragging" : ""}`}
                            draggable
                            onDragStart={(e) => onDragStart(e, t)}
                          >
                            {/* Tags */}
                            {t.tags?.length > 0 && (
                              <div
                                style={{
                                  display: "flex",
                                  gap: 4,
                                  marginBottom: 8,
                                  flexWrap: "wrap",
                                }}
                              >
                                {t.tags.slice(0, 2).map((g) => (
                                  <span key={g} className="tag">
                                    {g}
                                  </span>
                                ))}
                              </div>
                            )}

                            <p
                              style={{
                                fontSize: 13.5,
                                fontWeight: 600,
                                color: "#1e293b",
                                marginBottom: 8,
                                lineHeight: 1.4,
                              }}
                            >
                              {t.title}
                            </p>

                            <div
                              style={{
                                display: "flex",
                                alignItems: "center",
                                justifyContent: "space-between",
                                marginBottom: 8,
                              }}
                            >
                              <PriBadge p={t.priority} />
                              {t.due && (
                                <span
                                  style={{
                                    fontSize: 11,
                                    fontWeight: 600,
                                    color: over ? "#dc2626" : "#94a3b8",
                                  }}
                                >
                                  📅 {fmtDate(t.due)}
                                  {over ? " ⚠️" : ""}
                                </span>
                              )}
                            </div>

                            {t.progress > 0 && (
                              <div style={{ marginBottom: 8 }}>
                                <div
                                  style={{
                                    display: "flex",
                                    justifyContent: "space-between",
                                    marginBottom: 4,
                                  }}
                                >
                                  <span
                                    style={{ fontSize: 11, color: "#94a3b8" }}
                                  >
                                    Progress
                                  </span>
                                  <span
                                    style={{
                                      fontSize: 11,
                                      fontWeight: 700,
                                      color: "#475569",
                                    }}
                                  >
                                    {t.progress}%
                                  </span>
                                </div>
                                <ProgBar
                                  pct={t.progress}
                                  color={
                                    t.status === "done" ? "#10b981" : "#005BAC"
                                  }
                                />
                              </div>
                            )}

                            <div
                              style={{
                                display: "flex",
                                alignItems: "center",
                                justifyContent: "space-between",
                                marginTop: 8,
                              }}
                            >
                              {u && <Av user={u} size={26} />}
                              <div style={{ display: "flex", gap: 4 }}>
                                <button
                                  onClick={() => onEdit(t)}
                                  style={{
                                    width: 28,
                                    height: 28,
                                    borderRadius: 8,
                                    border: "1px solid #e2e8f0",
                                    background: "#fff",
                                    cursor: "pointer",
                                    fontSize: 13,
                                    display: "flex",
                                    alignItems: "center",
                                    justifyContent: "center",
                                  }}
                                  title="Edit"
                                >
                                  ✏️
                                </button>
                                <button
                                  onClick={() => onDelete(t.id)}
                                  style={{
                                    width: 28,
                                    height: 28,
                                    borderRadius: 8,
                                    border: "1px solid #fee2e2",
                                    background: "#fff5f5",
                                    cursor: "pointer",
                                    fontSize: 13,
                                    display: "flex",
                                    alignItems: "center",
                                    justifyContent: "center",
                                  }}
                                  title="Delete"
                                >
                                  🗑️
                                </button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                      {colTasks.length === 0 && (
                        <div
                          style={{
                            textAlign: "center",
                            padding: "36px 0",
                            color: "#d1d5db",
                          }}
                        >
                          <div style={{ fontSize: 32, marginBottom: 6 }}>
                            📭
                          </div>
                          <p style={{ fontSize: 12 }}>Drop tasks here</p>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════
   TEAM
═══════════════════════════════ */
      function Team({ users, tasks }) {
        return (
          <div
            className="fade-in"
            style={{ display: "flex", flexDirection: "column", gap: 24 }}
          >
            {/* Member Cards */}
            <div
              style={{
                display: "grid",
                gridTemplateColumns: "repeat(auto-fit,minmax(240px,1fr))",
                gap: 16,
              }}
            >
              {users
                .filter((u) => u.id !== 5)
                .map((u) => {
                  const asgd = tasks.filter((t) => t.assignee === u.id);
                  const done = asgd.filter((t) => t.status === "done");
                  const actv = asgd.filter((t) => t.status === "inprogress");
                  const pct = asgd.length
                    ? Math.round((done.length / asgd.length) * 100)
                    : 0;
                  return (
                    <div
                      key={u.id}
                      className="card card-hover"
                      style={{ padding: 20 }}
                    >
                      {/* Header */}
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 12,
                          marginBottom: 16,
                        }}
                      >
                        <Av user={u} size={50} />
                        <div>
                          <p
                            style={{
                              fontWeight: 700,
                              fontSize: 15,
                              fontFamily: "Outfit,sans-serif",
                              color: "#1e293b",
                              margin: 0,
                            }}
                          >
                            {u.name}
                          </p>
                          <p
                            style={{
                              fontSize: 12.5,
                              color: "#64748b",
                              margin: 0,
                            }}
                          >
                            {u.role}
                          </p>
                        </div>
                      </div>

                      {/* Stats */}
                      <div
                        style={{
                          display: "grid",
                          gridTemplateColumns: "1fr 1fr 1fr",
                          gap: 8,
                          marginBottom: 14,
                        }}
                      >
                        {[
                          {
                            v: asgd.length,
                            l: "Assigned",
                            bg: "#f8fafc",
                            c: "#1e293b",
                          },
                          {
                            v: done.length,
                            l: "Done",
                            bg: "#f0fdf4",
                            c: "#059669",
                          },
                          {
                            v: actv.length,
                            l: "Active",
                            bg: "#eff6ff",
                            c: "#2563eb",
                          },
                        ].map((s) => (
                          <div
                            key={s.l}
                            style={{
                              textAlign: "center",
                              padding: "8px 4px",
                              borderRadius: 10,
                              background: s.bg,
                            }}
                          >
                            <p
                              style={{
                                fontSize: 20,
                                fontWeight: 800,
                                fontFamily: "Outfit,sans-serif",
                                color: s.c,
                                margin: 0,
                              }}
                            >
                              {s.v}
                            </p>
                            <p
                              style={{
                                fontSize: 11,
                                color: "#94a3b8",
                                margin: 0,
                              }}
                            >
                              {s.l}
                            </p>
                          </div>
                        ))}
                      </div>

                      {/* Productivity */}
                      <div style={{ marginBottom: 12 }}>
                        <div
                          style={{
                            display: "flex",
                            justifyContent: "space-between",
                            marginBottom: 5,
                          }}
                        >
                          <span
                            style={{
                              fontSize: 12.5,
                              fontWeight: 600,
                              color: "#64748b",
                            }}
                          >
                            Productivity
                          </span>
                          <span
                            style={{
                              fontSize: 13,
                              fontWeight: 800,
                              color: u.color,
                            }}
                          >
                            {pct}%
                          </span>
                        </div>
                        <ProgBar pct={pct} color={u.color} h={8} />
                      </div>

                      {/* Active Tasks */}
                      <div>
                        <p
                          style={{
                            fontSize: 11,
                            fontWeight: 700,
                            color: "#94a3b8",
                            letterSpacing: ".5px",
                            marginBottom: 6,
                          }}
                        >
                          ACTIVE TASKS
                        </p>
                        {actv.slice(0, 2).map((t) => (
                          <div
                            key={t.id}
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: 6,
                              marginBottom: 4,
                            }}
                          >
                            <span
                              style={{
                                width: 6,
                                height: 6,
                                borderRadius: "50%",
                                background: "#2563eb",
                                flexShrink: 0,
                              }}
                            ></span>
                            <span
                              style={{
                                fontSize: 12,
                                color: "#475569",
                                overflow: "hidden",
                                textOverflow: "ellipsis",
                                whiteSpace: "nowrap",
                              }}
                            >
                              {t.title}
                            </span>

      function CalendarPage({ tasks }) {
        const [cur, setCur] = useState(new Date(2025, 1, 1));
        const yr = cur.getFullYear(),
          mo = cur.getMonth();
        const first = new Date(yr, mo, 1).getDay();
        const days = new Date(yr, mo + 1, 0).getDate();
        const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

        const tasksOnDay = (d) => {
          const s = `${yr}-${String(mo + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
          return tasks.filter((t) => t.due === s);
        };

        const upcomingMonth = [...tasks]
          .filter((t) => {
            const d = new Date(t.due);
            return (
              d.getMonth() === mo &&
              d.getFullYear() === yr &&
              t.status !== "done"
            );
          })
          .sort((a, b) => new Date(a.due) - new Date(b.due));

        return (
          <div
            className="fade-in"
            style={{ display: "flex", flexDirection: "column", gap: 20 }}
          >
            <div className="card" style={{ overflow: "hidden" }}>
              {/* Cal Header */}
              <div
                style={{
                  background: "linear-gradient(135deg,#003d78,#005BAC)",
                  padding: "16px 24px",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                }}
              >
                <h3
                  style={{
                    color: "#fff",
                    fontSize: 20,
                    fontWeight: 800,
                    fontFamily: "Outfit,sans-serif",
                    margin: 0,
                  }}
                >
                  {cur.toLocaleString("default", { month: "long" })} {yr}
                </h3>
                <div style={{ display: "flex", gap: 8 }}>
                  {["◀", "▶"].map((ic, i) => (
                    <button
                      key={ic}
                      onClick={() => setCur(new Date(yr, mo + (i ? 1 : -1), 1))}
                      style={{
                        width: 36,
                        height: 36,
                        borderRadius: 10,
                        background: "rgba(255,255,255,.15)",
                        border: "none",
                        color: "#fff",
                        cursor: "pointer",
                        fontSize: 14,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                      }}
                    >
                      {ic}
                    </button>
                  ))}
                </div>
              </div>

              {/* Day headers */}
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(7,1fr)",
                  borderBottom: "1px solid #edf0f4",
                }}
              >
                {dayNames.map((d) => (
                  <div
                    key={d}
                    style={{
                      padding: "10px 0",
                      textAlign: "center",
                      fontSize: 12,
                      fontWeight: 700,
                      color: "#94a3b8",
                      letterSpacing: ".5px",
                    }}
                  >
                    {d}
                  </div>
                ))}
              </div>

              {/* Grid */}
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(7,1fr)",
                }}
              >
                {Array.from({ length: first }).map((_, i) => (
                  <div
                    key={`e${i}`}
                    className="cal-day"
                    style={{ background: "#fafbfc" }}
                  ></div>
                ))}
                {Array.from({ length: days }).map((_, i) => {
                  const d = i + 1;
                  const dts = tasksOnDay(d);
                  const today = new Date();
                  const isT =
                    today.getDate() === d &&
                    today.getMonth() === mo &&
                    today.getFullYear() === yr;
                  return (
                    <div key={d} className="cal-day">
                      <div
                        style={{
                          width: 28,
                          height: 28,
                          borderRadius: "50%",
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                          fontSize: 13,
                          fontWeight: isT ? 800 : 500,
                          background: isT ? "#005BAC" : "transparent",
                          color: isT ? "#fff" : "#475569",
                          marginBottom: 4,
                          fontFamily: isT ? "Outfit,sans-serif" : "inherit",
                        }}
                      >
                        {d}
                      </div>
                      <div
                        style={{
                          display: "flex",
                          flexDirection: "column",
                          gap: 2,
                        }}
                      >
                        {dts.slice(0, 2).map((t) => (
                          <div
                            key={t.id}
                            style={{
                              fontSize: 10.5,
                              padding: "2px 6px",
                              borderRadius: 6,
                              fontWeight: 600,
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                              whiteSpace: "nowrap",
                              background:
                                t.priority === "high"
                                  ? "#fee2e2"
                                  : t.priority === "medium"
                                    ? "#fef3c7"
                                    : "#dbeafe",
                              color:
                                t.priority === "high"
                                  ? "#b91c1c"
                                  : t.priority === "medium"
                                    ? "#92400e"

                            {t.title}

                        {dts.length > 2 && (
                          <span
                            style={{
                              fontSize: 10,
                              color: "#94a3b8",
                              paddingLeft: 4,
                            }}

                            +{dts.length - 2}
                          </span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

                style={{
                  fontSize: 16,
                  fontWeight: 700,

                  gridTemplateColumns: "1fr 1fr",
                  gap: 10,
                }}
              >
                {upcomingMonth.slice(0, 8).map((t) => {
                  const d = new Date(t.due);
                  const over = d < new Date();
                  return (
                    <div
                      key={t.id}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 12,
                        padding: "10px 14px",
                        borderRadius: 12,
                        border: "1px solid #edf0f4",
                        background: over ? "#fef2f2" : "#fafbfc",
                      }}
                    >
                      <div
                        style={{
                          textAlign: "center",
                          width: 50,
                          padding: "6px 0",
                          borderRadius: 10,
                          background: over ? "#fee2e2" : "#eff6ff",
                          flexShrink: 0,
                        }}
                      >
                        <p
                          style={{
                            fontSize: 20,
                            fontWeight: 800,
                            fontFamily: "Outfit,sans-serif",
                            color: over ? "#dc2626" : "#1d4ed8",
                            margin: 0,
                            lineHeight: 1,
                          }}
                        >
                          {d.getDate()}
                        </p>
                        <p
                          style={{ fontSize: 10, color: "#94a3b8", margin: 0 }}
                        >
                          {d.toLocaleString("default", { month: "short" })}
                        </p>
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <p
                          style={{
                            fontSize: 13,
                            fontWeight: 600,
                            color: "#1e293b",
                            margin: "0 0 5px",
                            overflow: "hidden",
                            textOverflow: "ellipsis",
                            whiteSpace: "nowrap",
                          }}
                        >
                          {t.title}
                        </p>
                        <div style={{ display: "flex", gap: 5 }}>
                          <PriBadge p={t.priority} />
                          <StBadge s={t.status} />
                        </div>
                      </div>
                      {over && (
                        <span
                          style={{
                            fontSize: 10,
                            fontWeight: 800,
                            color: "#dc2626",
                            background: "#fee2e2",
                            padding: "3px 7px",
                            borderRadius: 8,
                            flexShrink: 0,
                          }}
                        >
                          OVERDUE
                        </span>
                      )}
                    </div>
                  );
                })}
                {upcomingMonth.length === 0 && (
                  <div
                    style={{
                      gridColumn: "span 2",
                      textAlign: "center",
                      padding: 32,
                      color: "#94a3b8",
                    }}
                  >
                    <div style={{ fontSize: 40 }}>🎉</div>
                    <p>No deadlines this month!</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════
   SUPERVISOR
═══════════════════════════════ */
      function Supervisor({ tasks, users }) {
        const total = tasks.length;
        const done = tasks.filter((t) => t.status === "done").length;
        const overdue = tasks.filter(
          (t) => t.due && isOverdue(t.due) && t.status !== "done",
        );
        const atRisk = tasks.filter(
          (t) => t.status === "inprogress" && t.progress < 40,
        );
        const pct = Math.round((done / total) * 100);

        return (
          <div
            className="fade-in"
            style={{ display: "flex", flexDirection: "column", gap: 24 }}
          >
            {/* Hero */}
            <div
              style={{
                background:
                  "linear-gradient(135deg,#0f172a 0%,#1e3a5f 55%,#1a4a8c 100%)",
                borderRadius: 20,
                padding: "28px 32px",
                color: "#fff",
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 14,
                  marginBottom: 20,
                }}
              >
                <Av user={users[4]} size={54} />
                <div>
                  <h2
                    style={{
                      fontSize: 22,
                      fontWeight: 800,
                      fontFamily: "Outfit,sans-serif",
                      margin: 0,
                    }}
                  >
                    Supervisor Dashboard
                  </h2>
                  <p
                    style={{
                      color: "rgba(255,255,255,.6)",
                      margin: 0,
                      fontSize: 13,
                    }}
                  >
                    Dr. Tariq Hassan · AI-Powered Recommendation System ·
                    CIIT-F24-CS-001
                  </p>
                </div>
              </div>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "repeat(4,1fr)",
                  gap: 14,
                }}
              >
                {[
                  { ic: "📋", v: total, l: "Total Tasks" },
                  { ic: "✅", v: done, l: "Completed" },
                  { ic: "🔴", v: overdue.length, l: "Overdue" },
                  { ic: "📊", v: `${pct}%`, l: "Progress" },
                ].map((s) => (
                  <div
                    key={s.l}
                    style={{
                      background: "rgba(255,255,255,.1)",
                      borderRadius: 14,
                      padding: "14px 16px",
                      textAlign: "center",
                    }}
                  >
                    <p style={{ fontSize: 26, margin: "0 0 4px" }}>{s.ic}</p>
                    <p
                      style={{
                        fontSize: 26,
                        fontWeight: 800,
                        fontFamily: "Outfit,sans-serif",
                        margin: 0,
                        lineHeight: 1,
                      }}
                    >
                      {s.v}
                    </p>
                    <p
                      style={{
                        color: "rgba(255,255,255,.5)",
                        fontSize: 12,
                        margin: "4px 0 0",
                      }}
                    >
                      {s.l}
                    </p>
                  </div>
                ))}
              </div>
            </div>

            <div
              style={{
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: 20,
              }}
            >
              {/* Team Progress */}
              <div className="card" style={{ padding: 20 }}>
                <h3
                  style={{
                    fontSize: 15,
                    fontWeight: 700,
                    fontFamily: "Outfit,sans-serif",
                    color: "#1e293b",
                    margin: "0 0 18px",
                  }}
                >
                  👥 Team Progress
                </h3>
                {users
                  .filter((u) => u.id !== 5)
                  .map((u) => {
                    const asgd = tasks.filter((t) => t.assignee === u.id);
                    const dn = asgd.filter((t) => t.status === "done").length;
                    const p = asgd.length
                      ? Math.round((dn / asgd.length) * 100)
                      : 0;
                    return (
                      <div
                        key={u.id}
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 12,
                          marginBottom: 16,
                        }}
                      >
                        <Av user={u} size={36} />
                        <div style={{ flex: 1 }}>
                          <div
                            style={{
                              display: "flex",
                              justifyContent: "space-between",
                              marginBottom: 5,
                            }}
                          >
                            <span
                              style={{
                                fontSize: 13.5,
                                fontWeight: 600,
                                color: "#1e293b",
                              }}
                            >
                              {u.name}
                            </span>
                            <span
                              style={{
                                fontSize: 13,
                                fontWeight: 800,
                                color: u.color,
                              }}
                            >
                              {p}%
                            </span>
                          </div>
                          <ProgBar pct={p} color={u.color} h={7} />
                          <p
                            style={{
                              fontSize: 11,
                              color: "#94a3b8",
                              margin: "3px 0 0",
                            }}
                          >
                            {dn}/{asgd.length} tasks done · {u.role}
                          </p>
                        </div>
                      </div>
                    );
                  })}
              </div>

              {/* At-Risk Tasks */}
              <div className="card" style={{ padding: 20 }}>
                <h3
                  style={{
                    fontSize: 15,
                    fontWeight: 700,
                    fontFamily: "Outfit,sans-serif",
                    color: "#1e293b",
                    margin: "0 0 16px",
                  }}
                >
                  ⚠️ At-Risk Tasks
                </h3>
                {[...overdue, ...atRisk].length === 0 && (
                  <div
                    style={{
                      textAlign: "center",
                      padding: 32,
                      color: "#94a3b8",
                    }}
                  >
                    <div style={{ fontSize: 40 }}>🎉</div>
                    <p style={{ fontSize: 14 }}>No at-risk tasks!</p>
                  </div>
                )}
                <div
                  style={{ display: "flex", flexDirection: "column", gap: 10 }}
                >
                  {[...overdue, ...atRisk].slice(0, 7).map((t) => {
                    const u = userById(t.assignee, users);
                    const over = isOverdue(t.due) && t.status !== "done";
                    return (
                      <div
                        key={t.id}
                        style={{
                          display: "flex",
                          alignItems: "flex-start",
                          gap: 10,
                          padding: "10px 12px",
                          borderRadius: 12,
                          background: "#fef2f2",
                          border: "1px solid #fecaca",
                        }}
                      >
                        <span style={{ fontSize: 18, flexShrink: 0 }}>
                          {over ? "🔴" : "⚡"}
                        </span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <p
                            style={{
                              fontSize: 13,
                              fontWeight: 600,
                              color: "#1e293b",
                              margin: 0,
                              overflow: "hidden",
                              textOverflow: "ellipsis",
                              whiteSpace: "nowrap",
                            }}
                          >
                            {t.title}
                          </p>
                          <p
                            style={{
                              fontSize: 11,
                              color: "#94a3b8",
                              margin: "3px 0 0",
                            }}
                          >
                            {u?.name} ·{" "}
                            {over
                              ? "Overdue"
                              : "Low progress (" + t.progress + "%)"}
                          </p>
                        </div>
                        <PriBadge p={t.priority} />
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Feedback */}
            <div className="card" style={{ padding: 20 }}>
              <h3
                style={{
                  fontSize: 15,
                  fontWeight: 700,
                  fontFamily: "Outfit,sans-serif",
                  color: "#1e293b",
                  margin: "0 0 18px",
                }}
              >
                💬 Supervisor Feedback Log
              </h3>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: 14,
                }}
              >
                {FEEDBACKS.map((fb) => {
                  const borderClr =
                    fb.type === "positive"
                      ? "#10b981"
                      : fb.type === "revision"
                        ? "#f59e0b"
                        : "#3b82f6";
                  const bgClr =
                    fb.type === "positive"
                      ? "#f0fdf4"
                      : fb.type === "revision"
                        ? "#fffbeb"
                        : "#eff6ff";
                  return (
                    <div
                      key={fb.id}
                      style={{
                        padding: "14px 16px",
                        borderRadius: 14,
                        borderLeft: `4px solid ${borderClr}`,
                        background: bgClr,
                      }}
                    >
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                          marginBottom: 8,
                        }}
                      >
                        <span
                          style={{
                            fontSize: 11,
                            fontWeight: 700,
                            color: "#64748b",
                            letterSpacing: ".3px",
                            textTransform: "uppercase",
                          }}
                        >
                          {fb.task}
                        </span>
                        <div style={{ display: "flex", gap: 2 }}>
                          {[1, 2, 3, 4, 5].map((n) => (
                            <span
                              key={n}
                              style={{
                                fontSize: 13,
                                color: n <= fb.rating ? "#f59e0b" : "#d1d5db",
                              }}
                            >
                              ★
                            </span>
                          ))}
                        </div>
                      </div>
                      <p
                        style={{
                          fontSize: 13,
                          color: "#334155",
                          lineHeight: 1.55,
                          margin: "0 0 10px",
                        }}
                      >
                        {fb.comment}
                      </p>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                        }}
                      >
                        <span
                          style={{
                            fontSize: 12,
                            fontWeight: 600,
                            color: "#64748b",
                          }}
                        >
                          Dr. Tariq Hassan
                        </span>
                        <span style={{ fontSize: 11, color: "#94a3b8" }}>
                          {fb.date}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Milestone Status */}
            <div className="card" style={{ padding: 20 }}>
              <h3
                style={{
                  fontSize: 15,
                  fontWeight: 700,
                  fontFamily: "Outfit,sans-serif",
                  color: "#1e293b",
                  margin: "0 0 16px",
                }}
              >
                🏆 Milestone Status
              </h3>
              <div
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr 1fr",
                  gap: 10,
                }}
              >
                {MILESTONES.map((m) => (
                  <div
                    key={m.id}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 12,
                      padding: "12px 14px",
                      borderRadius: 12,
                      border: "1px solid #edf0f4",
                      background:
                        m.pct === 100
                          ? "#f0fdf4"
                          : m.pct > 0
                            ? "#eff6ff"
                            : "#fafbfc",
                    }}
                  >
                    <div
                      style={{
                        width: 40,
                        height: 40,
                        borderRadius: "50%",
                        background:
                          m.pct === 100
                            ? "#10b981"
                            : m.pct > 0
                              ? "#005BAC"
                              : "#f1f5f9",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        color: m.pct > 0 ? "#fff" : "#94a3b8",
                        fontWeight: 700,
                        fontSize: 14,
                        flexShrink: 0,
                      }}
                    >
                      {m.pct === 100 ? "✓" : m.pct > 0 ? "⟳" : "○"}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p
                        style={{
                          fontSize: 13,
                          fontWeight: 600,
                          color: "#1e293b",
                          margin: "0 0 3px",
                          overflow: "hidden",
                          textOverflow: "ellipsis",
                          whiteSpace: "nowrap",
                        }}
                      >
                        {m.title}
                      </p>
                      <p style={{ fontSize: 11, color: "#94a3b8", margin: 0 }}>
                        {fmtDate(m.date)}
                      </p>
                    </div>
                    <span
                      style={{
                        padding: "4px 10px",
                        borderRadius: 20,
                        fontSize: 11,
                        fontWeight: 700,
                        background:
                          m.pct === 100
                            ? "#d1fae5"
                            : m.pct > 0
                              ? "#dbeafe"
                              : "#f1f5f9",
                        color:
                          m.pct === 100
                            ? "#065f46"
                            : m.pct > 0
                              ? "#1d4ed8"
                              : "#94a3b8",
                        flexShrink: 0,
                      }}
                    >
                      {m.pct === 100
                        ? "Done"
                        : m.pct > 0
                          ? `${m.pct}%`
                          : "Pending"}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════════════════════════
   ROOT APP
═══════════════════════════════ */
      function App() {
        const [page, setPage] = useState("dashboard");
        const [scollapsed, setSCollapsed] = useState(false);
        const [tasks, setTasks] = useState(INIT_TASKS);
        const [notifs, setNotifs] = useState(INIT_NOTIFS);
        const [modal, setModal] = useState(false);
        const [editing, setEditing] = useState(null);

        const openAdd = () => {
          setEditing(null);
          setModal(true);
        };
        const openEdit = (t) => {
          setEditing(t);
          setModal(true);
        };
        const onSave = (d) => {
          if (editing)
            setTasks((p) =>
              p.map((t) => (t.id === editing.id ? { ...editing, ...d } : t)),
            );
          else
            setTasks((p) => [
              ...p,
              { ...d, id: Date.now(), tags: d.tags || [] },
            ]);
          setModal(false);
          setEditing(null);
        };
        const onDelete = (id) => {
          if (window.confirm("Delete this task?"))
            setTasks((p) => p.filter((t) => t.id !== id));
        };

        const sw = scollapsed ? 68 : 264;

        const pg = () => {
          switch (page) {
            case "dashboard":
              return <Dashboard tasks={tasks} users={USERS} />;
            case "kanban":
              return (
                <Kanban
                  tasks={tasks}
                  setTasks={setTasks}
                  users={USERS}
                  onEdit={openEdit}
                  onDelete={onDelete}
                />
              );
            case "team":
              return <Team users={USERS} tasks={tasks} />;
            case "analytics":
              return <Analytics tasks={tasks} users={USERS} />;
            case "calendar":
              return <CalendarPage tasks={tasks} />;
            case "supervisor":
              return <Supervisor tasks={tasks} users={USERS} />;
            default:
              return <Dashboard tasks={tasks} users={USERS} />;
          }
        };

        return (
          <div style={{ display: "flex", fontFamily: "DM Sans,sans-serif" }}>
            <Sidebar
              page={page}
              setPage={setPage}
              collapsed={scollapsed}
              setCollapsed={setSCollapsed}
              tasks={tasks}
            />
            <div
              style={{
                marginLeft: sw,
                flex: 1,
                minHeight: "100vh",
                transition: "margin-left .28s cubic-bezier(.4,0,.2,1)",
                background: "#EEF2F7",
              }}
            >
              <Navbar
                page={page}
                notifs={notifs}
                setNotifs={setNotifs}
                onAdd={openAdd}
              />
              <div style={{ padding: 24, maxWidth: 1400, margin: "0 auto" }}>
                {pg()}
              </div>
            </div>
            {modal && (
              <TaskModal
                task={editing}
                users={USERS}
                onSave={onSave}
                onClose={() => {
                  setModal(false);
                  setEditing(null);
                }}
              />
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
