<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FYP Portal | CUI Abbottabad</title>
  <meta name="description" content="Sign in to the Final Year Project Portal — COMSATS University Islamabad Abbottabad Campus."/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
          colors: {
            primary: '#1E3A8A',
            secondary: '#2563EB',
            lightbg: '#EFF6FF',
            success: '#059669',
            warning: '#D97706',
            danger: '#DC2626',
            pending: '#B45309'
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-primary min-h-screen flex items-center justify-center p-6 selection:bg-secondary/30 selection:text-white">

<div class="bg-white rounded-2xl p-6 sm:p-8 w-full max-w-[440px] relative shadow-2xl animate-fade-in">
  <a href="index.html" class="inline-flex items-center gap-2 text-xs font-bold text-gray-400 hover:text-primary transition-colors mb-6">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <div class="flex flex-col items-center text-center mb-8">
    <div class="w-[72px] h-[72px] rounded-full bg-white flex items-center justify-center mb-4 shadow-sm border border-gray-100 overflow-hidden">
      <img src="../public/logocui.png" alt="CUI Logo" class="w-[85%] h-auto object-contain" onerror="this.src='https://via.placeholder.com/72x72/1E3A8A/ffffff?text=CUI'"/>
    </div>
    <h1 class="text-xl font-black text-primary leading-tight mb-1">CUI Abbottabad</h1>
    <div class="text-sm text-gray-500 font-medium">FYP Management System</div>
  </div>

  <div class="hidden bg-red-50 border-[1.5px] border-red-200 rounded-xl px-4 py-3 text-sm text-red-800 font-bold items-center gap-2 mb-5" id="errBox">
    <i class="fas fa-exclamation-circle text-red-600"></i>
    <span id="errMsg">Invalid credentials. Please try again.</span>
  </div>

  <form onsubmit="handleLogin(event)">
    <div class="flex flex-col gap-1.5 mb-5">
      <label class="text-xs font-bold text-gray-600">Select Role</label>
      <div class="relative">
        <i class="fas fa-user-circle absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none z-10"></i>
        <select class="w-full py-3 pr-10 pl-11 border-[1.5px] border-gray-200 rounded-xl text-sm text-gray-800 bg-white outline-none transition-all focus:border-secondary focus:ring-[3px] focus:ring-blue-600/10 appearance-none cursor-pointer" id="roleSelect" required>
          <option value="Student">Student</option>
          <option value="HOD">HOD</option>
          <option value="FYP Office">FYP Office</option>
          <option value="System Administrator">System Administrator</option>
          <option value="Faculty Supervisor">Faculty Supervisor</option>
          <option value="Industry Supervisor">Industry Supervisor</option>
        </select>
        <i class="fas fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
      </div>
    </div>

    <div class="flex flex-col gap-1.5 mb-5">
      <label class="text-xs font-bold text-gray-600">Email Address</label>
      <div class="relative">
        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none z-10"></i>
        <input type="email" id="emailIn" class="w-full py-3 pr-4 pl-11 border-[1.5px] border-gray-200 rounded-xl text-sm text-gray-800 bg-white outline-none transition-all focus:border-secondary focus:ring-[3px] focus:ring-blue-600/10" placeholder="Enter your email" required/>
      </div>
    </div>

    <div class="flex flex-col gap-1.5 mb-5">
      <label class="text-xs font-bold text-gray-600">Password</label>
      <div class="relative">
        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none z-10"></i>
        <input type="password" id="pwIn" class="w-full py-3 pr-11 pl-11 border-[1.5px] border-gray-200 rounded-xl text-sm text-gray-800 bg-white outline-none transition-all focus:border-secondary focus:ring-[3px] focus:ring-blue-600/10" placeholder="Enter your password" required/>
        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-secondary text-sm p-1 transition-colors z-10 focus:outline-none" onclick="togglePw()" aria-label="Toggle password visibility">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <div class="flex justify-between items-center mb-6">
      <div class="flex items-center gap-2">
        <input type="checkbox" id="remMe" class="w-4 h-4 accent-primary cursor-pointer border-gray-300 rounded"/>
        <label for="remMe" class="text-xs font-bold text-gray-500 cursor-pointer select-none">Remember me</label>
      </div>
      <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot Password?</a>
    </div>

    <button type="submit" class="w-full p-3.5 text-base font-bold rounded-xl bg-primary text-white flex items-center justify-center gap-2 transition-all hover:bg-blue-900 hover:-translate-y-[1px] hover:shadow-lg active:translate-y-0 disabled:opacity-80 disabled:cursor-not-allowed" id="submitBtn">
      <span id="btnTxt">Sign In</span>
      <i class="fas fa-arrow-right" id="btnIco"></i>
    </button>
  </form>
</div>

<script src="scripts/auth.js"></script>
<script>
  function togglePw() {
    const inp = document.getElementById('pwIn');
    const ico = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.className = 'fas fa-eye-slash';
    } else {
      inp.type = 'password';
      ico.className = 'fas fa-eye';
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errBox = document.getElementById('errBox');
    
    btn.disabled = true;
    document.getElementById('btnTxt').textContent = 'Signing In...';
    document.getElementById('btnIco').className = 'fas fa-spinner fa-spin';
    errBox.classList.add('hidden');
    errBox.classList.remove('flex');

    setTimeout(() => {
      const email = document.getElementById('emailIn').value.trim();
      const pw = document.getElementById('pwIn').value;

      if (typeof AUTH !== 'undefined' && AUTH.login) {
        const user = AUTH.login(email, pw);
        if (!user) {
          showError('Invalid email or password.');
          return;
        }
        
        if (user.role === 'Student') {
            window.location.href = 'student/dashboard.html';
        } else {
            window.location.href = ROLE_HOME ? ROLE_HOME[user.role] || 'dashboard.html' : 'dashboard.html';
        }
      } else {
        if (email.includes('@')) {
          document.getElementById('btnTxt').textContent = 'Redirecting...';
          window.location.href = 'dashboard.html';
        } else {
          showError('Please enter a valid email address.');
        }
      }
    }, 1000);

    function showError(msg) {
      errBox.classList.remove('hidden');
      errBox.classList.add('flex');
      document.getElementById('errMsg').textContent = msg;
      btn.disabled = false;
      document.getElementById('btnTxt').textContent = 'Sign In';
      document.getElementById('btnIco').className = 'fas fa-arrow-right';
    }
  }
</script>

</body>
</html>
